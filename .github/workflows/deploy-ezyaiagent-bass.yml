name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: "Supabase Edge Function name"
        required: false
        default: "ezyai-api"
      project_ref:
        description: "Supabase project ref (optional override)"
        required: false
        default: ""
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-ezyaiagent-bass.yml"

concurrency:
  group: deploy-ezyaiagent-bass
  cancel-in-progress: true

jobs:
  deploy-edge-function:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      INPUT_PROJECT_REF: ${{ github.event.inputs.project_ref }}
      SECRET_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      FUNCTION_NAME: ${{ github.event.inputs.function_name || 'ezyai-api' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve project ref
        id: project
        shell: bash
        run: |
          PROJECT_REF="${INPUT_PROJECT_REF}"
          if [ -z "$PROJECT_REF" ]; then
            PROJECT_REF="${SECRET_PROJECT_REF}"
          fi

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing GitHub secret: SUPABASE_ACCESS_TOKEN" >&2
            exit 1
          fi

          if [ -z "$PROJECT_REF" ]; then
            echo "Missing SUPABASE_PROJECT_REF (secret) or workflow input project_ref" >&2
            exit 1
          fi

          echo "project_ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"
          echo "Deploy target: $PROJECT_REF"

      - name: Deploy Edge Function
        shell: bash
        run: |
          supabase functions deploy "$FUNCTION_NAME" --project-ref "${{ steps.project.outputs.project_ref }}"
